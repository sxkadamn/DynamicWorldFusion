name: release

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build
        run: mvn -DskipTests package
      - name: Upload jar
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/*-shaded.jar
