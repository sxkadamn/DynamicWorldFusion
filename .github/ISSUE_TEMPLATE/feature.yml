name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you want.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or examples.
    validations:
      required: false
