name: Bug report
description: Report a reproducible problem
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and the expected behavior.
      placeholder: Steps, expected vs actual.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: 1) ... 2) ... 3) ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Server platform
      placeholder: Paper 1.21.x / Spigot 1.21.x
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs or stacktraces.
      render: shell
    validations:
      required: false
